<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Molly Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1c24;
  color:#fff;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0b141a;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.menu button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.container{
  flex:1;
  padding:20px;
}

.hidden{ display:none; }

input, select, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn{ background:#4CAF50; color:#fff; }
.btn-danger{ background:#e74c3c; color:#fff; }

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}

.tag{
  background:#3498db;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid #333;
}
#chatBox{
  display:flex;
  flex-direction:column;
}
.card{
  background:#1c2b36;
  padding:20px;
  border-radius:10px;
  min-width:150px;
  text-align:center;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Luka Chat Pro</h2>

  <div class="menu">
    <button onclick="mostrar('chats')">💬 Chats</button>
    <button onclick="mostrar('servicios')">⚙️ Servicios</button>
    <button onclick="mostrar('respuestas')">⚡ Respuestas</button>
    <button onclick="mostrar('dashboard')">📊 Dashboard</button>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container">

  <!-- CHATS -->
  <div id="chats">

<h2>💬 Chats en vivo</h2>

<div style="display:flex; gap:20px;">

  <div style="width:250px; border-right:1px solid #333;">
    <h3>Huéspedes</h3>
    <div id="listaGuests"></div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column;">

    <div id="chatBox" style="
      height:400px;
      overflow-y:auto;
      border:1px solid #333;
      padding:10px;
      margin-bottom:10px;
    "></div>

    <div style="display:flex; gap:10px;">
      <input id="adminMessage" placeholder="Escribe mensaje..." style="flex:1;">
      <button onclick="enviarMensaje()">Enviar</button>
    </div>

  </div>

</div>

</div>
  <!-- SERVICIOS -->
  <div id="servicios" class="hidden">

    <h2>Servicios</h2>

    <input id="name" placeholder="Nombre">

    <select id="department">
      <option>Recepción</option>
      <option>Mantenimiento</option>
      <option>Housekeeping</option>
      <option>Alimentos Bebidas</option>
    </select>

    <select id="type">
      <option value="info">Información</option>
      <option value="request">Solicitud</option>
      <option value="issue">Problema</option>
    </select>

    <!-- TAGS -->
    <div class="tags" id="tags"></div>
    <input id="keywordInput" placeholder="Agregar keyword + Enter">

    <textarea id="response" placeholder="Respuesta automática"></textarea>

    <button class="btn" onclick="guardarServicio()">+ Guardar</button>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Depto</th>
          <th>Tipo</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaServicios"></tbody>
    </table>

  </div>

  <!-- RESPUESTAS -->
  <div id="respuestas" class="hidden">

    <h2>Respuestas rápidas</h2>

    <input id="trigger" placeholder="Palabra clave">
    <textarea id="respuestaTexto" placeholder="Respuesta"></textarea>

    <button class="btn" onclick="guardarRespuesta()">+ Guardar</button>

    <table>
      <thead>
        <tr>
          <th>Trigger</th>
          <th>Respuesta</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaRespuestas"></tbody>
    </table>

  </div>

</div>
<div id="dashboard" class="hidden">

<h2>📊 Dashboard</h2>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

  <div class="card">
    <h3 id="totalGuests">0</h3>
    <p>Huéspedes activos</p>
  </div>

  <div class="card">
    <h3 id="totalMessages">0</h3>
    <p>Mensajes</p>
  </div>

  <div class="card">
    <h3 id="totalTickets">0</h3>
    <p>Tickets</p>

  </div>
  <div class="card">
  <h3 id="totalPending">0</h3>
  <p>Chats sin responder</p>
</div>

</div>

</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
function mostrar(seccion){
  ["chats","servicios","respuestas","dashboard"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.add("hidden");
  });

  const active = document.getElementById(seccion);
  if(active) active.classList.remove("hidden");

  if(seccion === "dashboard"){
    cargarDashboard();
  }
}
const API = "https://mollyhelpers.com";

let socket;
let currentGuest = null;
let unread = {};

// 🔊 sonido simple
const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ================= SOCKET =================
function initSocket(){

  socket = io(API,{
    auth:{
      token: localStorage.getItem("token")
    }
  });

  const company_code = localStorage.getItem("company_code");

  socket.emit("join_admin", company_code);

  socket.on("new_message",(msg)=>{

  if(msg.sender === "guest"){

    if(msg.guest_id !== currentGuest){
      unread[msg.guest_id] = (unread[msg.guest_id] || 0) + 1;
      renderGuests();
      audio.play();
      return;
    }

  }

  if(msg.guest_id === currentGuest){
    agregarMensaje(msg);
  }

});

}

// ================= GUESTS =================
async function cargarGuests(){

  const company_code = localStorage.getItem("company_code");

  const res = await fetch(API + "/guests/" + company_code);
  const data = await res.json();

  window.guestsData = data;

  renderGuests();
}

function renderGuests(){

  const div = document.getElementById("listaGuests");
  div.innerHTML="";

  (window.guestsData || []).forEach(g=>{
   let alerta = "";

if(g.last_message_at && !g.last_response_at){
  alerta = " 🔴";
}

    const el = document.createElement("div");

    const isActive = g.id === currentGuest;

    el.style.padding="10px";
    el.style.cursor="pointer";
    el.style.borderBottom="1px solid #333";
    el.style.background = isActive ? "#1e3a46" : "transparent";

    const assigned = g.assigned_to 
  ? `<div style="font-size:11px;color:#00d1b2;">👤 ${g.assigned_to}</div>`
  : `<div style="font-size:11px;color:#999;">Sin asignar</div>`;

const badge = unread[g.id] 
  ? `<span style="color:red;">(${unread[g.id]})</span>` 
  : "";

el.innerHTML = `
  👤 ${g.name} (Hab ${g.room}) ${badge} ${alerta}
  ${assigned}
`;

el.onclick = ()=> seleccionarGuest(g.id);

div.appendChild(el);

  });
}


// ================= CHAT =================
async function seleccionarGuest(id){

  currentGuest = id;

   renderGuests();

  const company_code = localStorage.getItem("company_code");

  const res = await fetch(API + "/chat/" + id + "?company_code=" + company_code);
  const data = await res.json();

  const chat = document.getElementById("chatBox");

chat.innerHTML = `
  <div style="margin-bottom:10px;">
    <button onclick="asignar()">Asignarme este chat</button>
  </div>
`;

  data.forEach(m=> agregarMensaje(m));
}

// ================= MENSAJE =================
function agregarMensaje(m){

  const div = document.createElement("div");

  div.style.marginBottom="8px";
  div.style.padding="6px 10px";
  div.style.borderRadius="8px";
  div.style.maxWidth="70%";

  if(m.sender === "guest"){
    div.style.background="#2c3e50";
    div.innerHTML = `👤 ${m.message}`;
  }else{
    div.style.background="#16a085";
    div.style.alignSelf="flex-end";
    div.innerHTML = `🤖 ${m.message}`;
  }

  document.getElementById("chatBox").appendChild(div);

  const chat = document.getElementById("chatBox");
  chat.scrollTop = chat.scrollHeight;
}

// ================= ENVIAR =================
function enviarMensaje(){

  const input = document.getElementById("adminMessage");
  const msg = input.value;

  if(!msg || !currentGuest) return;

  const company_code = localStorage.getItem("company_code");

  socket.emit("admin_send_message",{
    guest_id: currentGuest,
    message: msg,
    company_code
  });

  input.value="";
}
async function asignar(){

  const staff = localStorage.getItem("user_name") || "Staff";

  await fetch(API + "/assign",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      guest_id: currentGuest,
      staff
    })
  });

  cargarGuests();
}
async function cargarDashboard(){

  const company_code = localStorage.getItem("company_code");

  const guests = await fetch(API + "/guests/" + company_code).then(r=>r.json());
  const tickets = await fetch(API + "/tickets/" + company_code).then(r=>r.json());

  document.getElementById("totalGuests").innerText = guests.length;
  document.getElementById("totalTickets").innerText = tickets.length;

  let total = 0;
  let sinResponder = 0;

  for(const g of guests){

    const msgs = await fetch(API + "/chat/" + g.id + "?company_code=" + company_code).then(r=>r.json());
    total += msgs.length;

    if(g.last_message_at && !g.last_response_at){
      sinResponder++;
    }
  }

  document.getElementById("totalMessages").innerText = total;
  document.getElementById("totalPending").innerText = sinResponder;
}
async function guardarServicio(){

 try{

  const nombre = document.getElementById("name").value;
  const departamento = document.getElementById("department").value;
  const respuesta = document.getElementById("response").value;

  const res = await fetch(API + "/services",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({
      name: nombre,
      department: departamento,
      response: respuesta
    })
  });

  const data = await res.json();

  if(!res.ok){
    console.error("❌ ERROR:", data);
    alert("Error guardando servicio");
    return;
  }

  alert("✅ Servicio guardado");

 }catch(err){
  console.error("❌ ERROR guardarServicio:", err);
 }

}
// INIT CHAT
initSocket();
cargarGuests();
</script>
</body>
</html>
