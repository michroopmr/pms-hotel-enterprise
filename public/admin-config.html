<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luka Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1c24;
  color:#fff;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0b141a;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.menu button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.container{
  flex:1;
  padding:20px;
}

.hidden{ display:none; }

input, select, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn{ background:#4CAF50; color:#fff; }
.btn-danger{ background:#e74c3c; color:#fff; }

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}

.tag{
  background:#3498db;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid #333;
}
#chatBox{
  display:flex;
  flex-direction:column;
}
.card{
  background:#1c2b36;
  padding:20px;
  border-radius:10px;
  min-width:150px;
  text-align:center;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Luka Chat Pro</h2>

  <div class="menu">
    <button onclick="mostrar('chats')">💬 Chats</button>
    <button onclick="mostrar('servicios')">⚙️ Servicios</button>
    <button onclick="mostrar('respuestas')">⚡ Respuestas</button>
    <button onclick="mostrar('dashboard')">📊 Dashboard</button>
    <button onclick="logout()" style="background:#e74c3c;color:white;">🚪 Cerrar sesión</button>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container">

  <!-- CHATS -->
  <div id="chats">

<h2>💬 Chats en vivo</h2>

<div style="display:flex; gap:20px;">

  <div style="width:250px; border-right:1px solid #333;">
    <h3>Huéspedes</h3>
    <div id="listaGuests"></div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column;">

    <div id="chatBox" style="
      height:400px;
      overflow-y:auto;
      border:1px solid #333;
      padding:10px;
      margin-bottom:10px;
    "></div>

    <div style="display:flex; gap:10px;">
      <input id="adminMessage" placeholder="Escribe mensaje..." style="flex:1;">
      <button onclick="enviarMensaje()">Enviar</button>
    </div>

  </div>

</div>

</div>
  <!-- SERVICIOS -->
  <div id="servicios" class="hidden">

    <h2>Servicios</h2>

    <input id="name" placeholder="Nombre">

    <select id="department">
      <option>Recepción</option>
      <option>Mantenimiento</option>
      <option>Housekeeping</option>
      <option>Alimentos Bebidas</option>
    </select>

    <select id="type">
      <option value="info">Información</option>
      <option value="request">Solicitud</option>
      <option value="issue">Problema</option>
    </select>

    <!-- TAGS -->
    <div class="tags" id="tags"></div>
    <input id="keywordInput" placeholder="Agregar keyword + Enter">

    <textarea id="response" placeholder="Respuesta automática"></textarea>

    <button class="btn" onclick="guardarServicio()">+ Guardar</button>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Depto</th>
          <th>Tipo</th>
          <th>Keywords</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaServicios"></tbody>
    </table>

  </div>

  <!-- RESPUESTAS -->
  <div id="respuestas" class="hidden">

    <h2>Respuestas rápidas</h2>

    <input id="trigger" placeholder="Palabra clave">
    <textarea id="respuestaTexto" placeholder="Respuesta"></textarea>

    <button class="btn" onclick="guardarRespuesta()">+ Guardar</button>

    <table>
      <thead>
        <tr>
          <th>Trigger</th>
          <th>Respuesta</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaRespuestas"></tbody>
    </table>

  </div>

</div>
<div id="dashboard" class="hidden">

<h2>📊 Dashboard</h2>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

  <div class="card">
    <h3 id="totalGuests">0</h3>
    <p>Huéspedes activos</p>
  </div>

  <div class="card">
    <h3 id="totalMessages">0</h3>
    <p>Mensajes</p>
  </div>

  <div class="card">
    <h3 id="totalTickets">0</h3>
    <p>Tickets</p>

  </div>
  <div class="card">
  <h3 id="totalPending">0</h3>
  <p>Chats sin responder</p>
</div>

</div>

</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

   const adminInput = document.getElementById("adminMessage");

adminInput.addEventListener("input", ()=>{

  if(!currentGuest) return;

  socket.emit("admin_typing",{
    guest_id: currentGuest
  });

});

function mostrar(seccion){
  ["chats","servicios","respuestas","dashboard"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.add("hidden");
  });

  const active = document.getElementById(seccion);
  if(active) active.classList.remove("hidden");

  if(seccion === "dashboard"){
    cargarDashboard();
  }
   // 🔥 AGREGA ESTO
  if(seccion === "servicios"){
    cargarServicios();
  }
  if(seccion === "respuestas"){
  cargarRespuestas();
  }
}

const API = "https://mollyhelpers.com";

let socket;
let currentGuest = null;
let unread = {};

// 🔊 sonido simple
const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ================= SOCKET =================
socket = io(API,{
  auth:{
    token: localStorage.getItem("token")
  },
  transports:["websocket","polling"],
  reconnection:true,
  reconnectionAttempts:5,
  reconnectionDelay:1000,
  timeout:20000
});

socket.on("connect", ()=>{
  console.log("🟢 Socket conectado");

  const company_code = localStorage.getItem("company_code");
  socket.emit("join_admin", company_code);
});

socket.on("disconnect", ()=>{
  console.log("🔴 Socket desconectado");
});

socket.on("message_read",(data)=>{
  console.log("👁️ mensaje leído", data);
});

socket.io.on("reconnect", ()=>{
  console.log("🔄 reconectado");

  cargarGuests();

  if(currentGuest){
    seleccionarGuest(currentGuest);
  }
});

  socket.on("typing", (data)=>{

  if(data.guest_id !== currentGuest) return;

  const existing = document.getElementById("typingGuest");
  if(existing) return;

  const div = document.createElement("div");
  div.id = "typingGuest";
  div.innerHTML = "👤 escribiendo...";

  document.getElementById("chatBox").appendChild(div);

  setTimeout(()=> div.remove(), 1500);

});
  
socket.on("new_message",(msg)=>{

  if(msg.sender === "admin") return;

  // 🔥 REFRESCA LISTA SI NO ES CHAT ACTIVO
  if(msg.guest_id !== currentGuest){
    unread[msg.guest_id] = (unread[msg.guest_id] || 0) + 1;
    cargarGuests(); // 🔥 aquí entra tu cambio
    audio.play();
    return;
  }

  // 🔥 SI ES EL CHAT ACTIVO → SOLO AGREGA
  if(msg.guest_id === currentGuest){
    agregarMensaje(msg);
  }

});

// ================= GUESTS =================
async function cargarGuests(){

  const company_code = localStorage.getItem("company_code");

  const res = await fetch(API + "/guests/" + company_code);

if(!res.ok){
  console.error("❌ ERROR guests:", res.status);
  return;
}

const data = await res.json();
}

function renderGuests(){

  const div = document.getElementById("listaGuests");
  div.innerHTML="";

  (window.guestsData || []).forEach(g=>{
   let alerta = "";

if(g.last_message_at && !g.last_response_at){
  alerta = " 🔴";
}

    const el = document.createElement("div");

    const isActive = g.id === currentGuest;

    el.style.padding="10px";
    el.style.cursor="pointer";
    el.style.borderBottom="1px solid #333";
    el.style.background = isActive ? "#1e3a46" : "transparent";

    const assigned = g.assigned_to 
  ? `<div style="font-size:11px;color:#00d1b2;">👤 ${g.assigned_to}</div>`
  : `<div style="font-size:11px;color:#999;">Sin asignar</div>`;

const badge = unread[g.id] 
  ? `<span style="color:red;">(${unread[g.id]})</span>` 
  : "";

el.innerHTML = `
  👤 ${g.name} (Hab ${g.room}) ${badge} ${alerta}
  ${assigned}
`;

el.onclick = ()=> seleccionarGuest(g.id);


div.appendChild(el);

  });
}


// ================= CHAT =================
async function seleccionarGuest(id){

  currentGuest = id;
  
  unread[id] = 0; // 🔥 limpiar contador
  
   renderGuests();

  const company_code = localStorage.getItem("company_code");

  const res = await fetch(`${API}/chat/${id}?company_code=${company_code}`);
  const data = await res.json();

  const chat = document.getElementById("chatBox");

chat.innerHTML = `
  <div style="margin-bottom:10px;">
    <button onclick="asignar()">Asignarme este chat</button>
  </div>
`;

  data.forEach(m=> agregarMensaje(m));
}

// ================= MENSAJE =================
function agregarMensaje(m){

  const div = document.createElement("div");

  div.style.marginBottom="8px";
  div.style.padding="6px 10px";
  div.style.borderRadius="8px";
  div.style.maxWidth="70%";

if(m.sender === "guest"){
  div.innerHTML = `👤 ${m.message}`;
}else if(m.sender === "admin"){
  div.innerHTML = `🧑‍💼 ${m.message}`;
}else if(m.sender === "bot"){
  div.innerHTML = `🤖 ${m.message}`;
}

  document.getElementById("chatBox").appendChild(div);

  const chat = document.getElementById("chatBox");
  chat.scrollTop = chat.scrollHeight;
}

// ================= ENVIAR =================
function enviarMensaje(){

  const input = document.getElementById("adminMessage");
  const msg = input.value;

  if(!msg || !currentGuest) return;

  const company_code = localStorage.getItem("company_code");

  socket.emit("admin_send_message",{
  guest_id: currentGuest,
  message: msg,
  company_code
});

agregarMensaje({
  message: msg,
  sender:"admin"
});

input.value="";
}

async function asignar(){

  const staff = localStorage.getItem("user_name") || "Staff";

  await fetch(API + "/assign",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      guest_id: currentGuest,
      staff
    })
  });

  cargarGuests();
}
async function cargarDashboard(){

  const company_code = localStorage.getItem("company_code");

  const guests = await fetch(API + "/guests/" + company_code).then(r=>r.json());
  const resTickets = await fetch(API + "/tickets/" + company_code);

if(!resTickets.ok){
  console.error("HTTP ERROR tickets:", resTickets.status);
  return;
}

const tickets = await resTickets.json();

  document.getElementById("totalGuests").innerText = guests.length;
  document.getElementById("totalTickets").innerText = tickets.length;

  let total = 0;
  let sinResponder = 0;

  for(const g of guests){

    const msgs = await fetch(API + "/chat/" + g.id + "?company_code=" + company_code).then(r=>r.json());
    total += msgs.length;

    if(g.last_message_at && !g.last_response_at){
      sinResponder++;
    }
  }

  document.getElementById("totalMessages").innerText = total;
  document.getElementById("totalPending").innerText = sinResponder;
}
async function guardarServicio(){

 try{

  const nombre = document.getElementById("name").value;
  const departamento = document.getElementById("department").value;
  const respuesta = document.getElementById("response").value;
  const tipo = document.getElementById("type").value;

 const url = window.editandoServicio
  ? API + "/admin/services/" + window.editandoServicio
  : API + "/admin/services";

const method = window.editandoServicio ? "PUT" : "POST";

const res = await fetch(url,{
  method,
  headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer " + localStorage.getItem("token")
  },
  body: JSON.stringify({
    name: nombre,
    keywords: nombre.toLowerCase().split(" "),
    department: departamento,
    type: tipo,
    auto_response: respuesta
  })
});

  const data = await res.json();

  if(!res.ok){
    console.error("❌ ERROR:", data);
    alert("Error guardando servicio");
    return;
  }

  alert("✅ Servicio guardado");
cargarServicios(); // 🔥 refrescar tabla

 }catch(err){
  console.error("❌ ERROR guardarServicio:", err);
 }

 window.editandoServicio = null;
}

async function guardarRespuesta(){

 try{

  const trigger = document.getElementById("trigger").value;
  const respuesta = document.getElementById("respuestaTexto").value;

 const res = await fetch(API + "/admin/flows",{
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer " + localStorage.getItem("token") // 🔥 CLAVE
  },
  body: JSON.stringify({
    trigger,
    response: respuesta
  })
}); 

  const data = await res.json();

  if(!res.ok){
    console.error("❌ ERROR:", data);
    alert("Error guardando respuesta");
    return;
  }

  alert("✅ Respuesta guardada");

 }catch(err){
  console.error("❌ ERROR guardarRespuesta:", err);
 }

}

async function cargarServicios(){

  try{

    const res = await fetch(API + "/admin/services",{
  headers:{
    "Authorization":"Bearer " + localStorage.getItem("token")
  }
});

if(!res.ok){
  console.error("❌ ERROR servicios:", res.status);
  return;
}

const data = await res.json();

    const tbody = document.getElementById("tablaServicios");
    tbody.innerHTML = "";

    window.serviciosData = data;

    data.forEach(s=>{
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${s.name}</td>
    <td>${s.department}</td>
    <td>${s.type}</td>
    <td>${(s.keywords || []).join(", ")}</td
    <td>
      <button onclick="editarServicio(${s.id})">✏️</button>
      <button class="btn-danger" onclick="eliminarServicio(${s.id})">Eliminar</button>
    </td>
  `;

      tbody.appendChild(tr);

    });

  }catch(err){
    console.error("❌ ERROR cargarServicios:", err);
  }

}
async function cargarRespuestas(){

  const res = await fetch(API + "/admin/flows",{
    headers:{
      "Authorization":"Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  const tbody = document.getElementById("tablaRespuestas");
  tbody.innerHTML = "";

  data.forEach(r=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.trigger}</td>
      <td>${r.response}</td>
      <td>
        <button onclick="eliminarRespuesta(${r.id})">🗑️</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}
async function eliminarRespuesta(id){

  await fetch(API + "/admin/flows/" + id,{
    method:"DELETE",
    headers:{
      "Authorization":"Bearer " + localStorage.getItem("token")
    }
  });

  cargarRespuestas();
}
function logout(){
  localStorage.clear();
  window.location.href = "/login.html";
}
async function eliminarServicio(id){

  if(!confirm("¿Eliminar servicio?")) return;

  try{

    const res = await fetch(API + "/admin/services/" + id,{
      method:"DELETE",
      headers:{
        "Authorization":"Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    if(!res.ok){
      console.error("❌ ERROR:", data);
      alert("Error eliminando");
      return;
    }

    cargarServicios(); // 🔥 refresca tabla

  }catch(err){
    console.error("❌ ERROR eliminarServicio:", err);
  }

}
async function editarServicio(id){

  const servicio = (window.serviciosData || []).find(s=>s.id === id);

  if(!servicio) return;

  document.getElementById("name").value = servicio.name;
  document.getElementById("department").value = servicio.department;
  document.getElementById("type").value = servicio.type;
  document.getElementById("response").value = servicio.auto_response;

  window.editandoServicio = id;
}
// INIT CHAT
cargarGuests();
</script>
</body>
</html>
