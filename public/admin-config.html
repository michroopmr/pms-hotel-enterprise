<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Molly Chat Pro</title>
<script src="https://mollyhelpers.com/socket.io/socket.io.js"></script>
<style>
body{margin:0;font-family:Arial;display:flex;height:100vh;background:#f3f4f6}
.sidebar{width:260px;background:#111827;color:white;display:flex;flex-direction:column}
.sidebar h2{padding:20px;margin:0}
#chatList{flex:1;overflow:auto}
.chat-item{padding:12px;border-bottom:1px solid #374151;cursor:pointer}
.chat-item:hover{background:#1f2937}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:15px;background:white;border-bottom:1px solid #ddd}
.messages{flex:1;padding:15px;overflow:auto}
.msg{margin-bottom:10px;padding:10px;border-radius:10px;max-width:60%}
.guest{background:#e0f2fe}
.bot{background:#dcfce7;margin-left:auto}
.input{display:flex;padding:10px;background:white;border-top:1px solid #ddd}
.input input{flex:1;padding:10px;border-radius:8px;border:1px solid #ccc}
.input button{margin-left:10px;padding:10px;border:none;background:#2563eb;color:white;border-radius:8px}
</style>
</head>
<body>
<div class="sidebar">
<h2>Chats</h2>
<div id="chatList"></div>
</div>
<div class="main">
<div class="header" id="chatHeader">Selecciona un chat</div>
<div class="messages" id="messages"></div>
<div class="input">
<input id="msgInput" placeholder="Escribe mensaje...">
<button onclick="sendMsg()">Enviar</button>
</div>
</div>
<script>
const API="https://mollyhelpers.com";
const token=localStorage.getItem("token");
const company_code=localStorage.getItem("company_code");
let currentGuest=null;

const socket=io(API,{auth:{token}});
socket.on("connect",()=>{
 socket.emit("join_admin",company_code);
});

async function loadGuests(){
 const r=await fetch(`${API}/guests/${company_code}`);
 const data=await r.json();
 const cont=document.getElementById("chatList");
 cont.innerHTML="";
 data.forEach(g=>{
  cont.innerHTML+=`<div class='chat-item' onclick='openChat(${g.id},"${g.name}","${g.room}")'>🛏 ${g.room} - ${g.name}</div>`;
 });
}

async function openChat(id,name,room){
 currentGuest=id;
 document.getElementById("chatHeader").innerText=`Habitación ${room} - ${name}`;
 const r=await fetch(`${API}/chat/${id}?company_code=${company_code}`);
 const data=await r.json();
 renderMessages(data);
}

function renderMessages(list){
 const cont=document.getElementById("messages");
 cont.innerHTML=list.map(m=>`
  <div class='msg ${m.sender}'>${m.message}</div>
 `).join("");
 cont.scrollTop=cont.scrollHeight;
}

socket.on("new_message",(data)=>{
 if(data.guest_id===currentGuest){
  const cont=document.getElementById("messages");
  cont.innerHTML+=`<div class='msg ${data.sender}'>${data.message}</div>`;
  cont.scrollTop=cont.scrollHeight;
 }
});

async function sendMsg(){
 const input=document.getElementById("msgInput");
 const text=input.value;
 if(!text||!currentGuest) return;

 await fetch(`${API}/chat/message`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   guest_id:currentGuest,
   message:text,
   sender:"admin",
   company_code
  })
 });

 input.value="";
}

loadGuests();
</script>
</body>
</html>
