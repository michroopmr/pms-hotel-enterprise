<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luka Chat Bot Servicios</title>

<style>
body{
  font-family: Arial;
  background:#0f1c24;
  color:#fff;
  padding:20px;
}

h2{ margin-bottom:10px; }

.container{
  max-width:900px;
  margin:auto;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn{
  background:#4CAF50;
  color:#fff;
}

.btn-danger{
  background:#e74c3c;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}

.tag{
  background:#3498db;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
}

.table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

.table th, .table td{
  padding:10px;
  border-bottom:1px solid #333;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>⚙️ Servicios</h2>

<!-- FORMULARIO -->
<input id="name" placeholder="Nombre del servicio">

<select id="category">
  <option>Mantenimiento</option>
  <option>Housekeeping</option>
  <option>Recepción</option>
  <option>Restaurante</option>
</select>

<select id="department">
  <option>Recepción</option>
  <option>Mantenimiento</option>
  <option>Housekeeping</option>
  <option>Alimentos Bebidas</option>
</select>

<select id="type">
  <option value="info">Información</option>
  <option value="request">Solicitud</option>
  <option value="issue">Problema técnico</option>
</select>

<select id="priority">
  <option value="baja">Baja</option>
  <option value="normal" selected>Normal</option>
  <option value="alta">Alta</option>
</select>

<!-- KEYWORDS TAGS -->
<div class="tags" id="tags"></div>
<input id="keywordInput" placeholder="Agregar keyword y presiona Enter">

<textarea id="response" placeholder="Respuesta automática"></textarea>

<label>
  <input type="checkbox" id="autoTicket"> Crear ticket automáticamente
</label>

<br><br>

<button class="btn" onclick="guardarServicio()">+ Guardar servicio</button>

<!-- TABLA -->
<table class="table" id="tabla">
<thead>
<tr>
<th>Nombre</th>
<th>Depto</th>
<th>Tipo</th>
<th>Acciones</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

let keywords = [];
let editId = null;
const API = "https://mollyhelpers.com";

// ================= TAGS =================
const input = document.getElementById("keywordInput");

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    const value = input.value.trim();
    if(!value) return;

    keywords.push(value);
    input.value = "";
    renderTags();
  }
});

function renderTags(){
  const container = document.getElementById("tags");
  container.innerHTML = "";

  keywords.forEach((k,i)=>{
    const div = document.createElement("div");
    div.className = "tag";
    div.innerText = k;
    div.onclick = ()=>{
      keywords.splice(i,1);
      renderTags();
    };
    container.appendChild(div);
  });
}

// ================= GUARDAR =================
async function guardarServicio(){

  const data = {
    name: document.getElementById("name").value,
    keywords,
    department: document.getElementById("department").value,
    type: document.getElementById("type").value,
    auto_response: document.getElementById("response").value
  };

  await fetch(API + "/admin/services",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify(data)
  });

  limpiar();
  cargarServicios();
}

// ================= LIMPIAR =================
function limpiar(){
  document.getElementById("name").value = "";
  document.getElementById("response").value = "";
  keywords = [];
  renderTags();
}

// ================= LISTAR =================
async function cargarServicios(){

  const res = await fetch(API + "/admin/services",{
    headers:{
      "Authorization":"Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  data.forEach(s=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${s.name}</td>
      <td>${s.department}</td>
      <td>${s.type}</td>
      <td>
        <button onclick="editar(${s.id})">✏️</button>
        <button class="btn-danger" onclick="eliminar(${s.id})">🗑</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// ================= ELIMINAR =================
async function eliminar(id){

  if(!confirm("¿Eliminar servicio?")) return;

  await fetch(API + "/admin/services/" + id,{
    method:"DELETE",
    headers:{
      "Authorization":"Bearer " + localStorage.getItem("token")
    }
  });

  cargarServicios();
}

// ================= EDITAR =================
function editar(id){
  alert("Modo edición (puedo ayudarte a implementarlo después 🔥)");
}

// INIT
cargarServicios();

</script>

</body>
</html>
