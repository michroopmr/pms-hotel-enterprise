<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body{
 margin:0;
 font-family: Arial;
 display:flex;
 height:100vh;
}

/* SIDEBAR */
.sidebar{
 width:30%;
 background:#111827;
 color:white;
 overflow-y:auto;
}

.user{
 padding:15px;
 border-bottom:1px solid #374151;
 cursor:pointer;
}

.user.active{
 background:#25d366;
}

/* ALERTA */
.user.alert{
 background:#dc2626;
}

/* CHAT */
.chat{
 flex:1;
 display:flex;
 flex-direction:column;
}

.messages{
 flex:1;
 padding:15px;
 background:#ece5dd;
 overflow-y:auto;
}

.me{
 background:#dcf8c6;
 align-self:flex-end;
 border-bottom-right-radius:5px;
}

.guest{
 background:white;
 align-self:flex-start;
 border-bottom-left-radius:5px;
}

.me{ background:#dcf8c6; align-self:flex-end; }
.guest{ background:white; align-self:flex-start; }

.input{
 display:flex;
 padding:10px;
 background:#f3f4f6;
}

input{
 flex:1;
 padding:10px;
 border-radius:20px;
 border:none;
}

button{
 margin-left:10px;
 padding:10px;
 border:none;
 border-radius:20px;
 background:#25d366;
 color:white;
}
.msg{
 margin:5px 0;
 padding:10px 14px;
 border-radius:15px;
 max-width:70%;
 font-size:14px;
}
</style>
</head>

<body>

<div class="sidebar" id="users"></div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput">
    <button onclick="send()">➤</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io("https://mollyhelpers.com");
const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa") || "DEMO01";
const API = "https://mollyhelpers.com";

socket.emit("join_admin", company_code);

let currentGuest = null;
let alerts = {};

const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
// 🔥 ACTIVAR AUDIO CON INTERACCIÓN (OBLIGATORIO)
document.body.addEventListener("click", () => {
  audio.play().then(()=>{
    audio.pause();
    audio.currentTime = 0;
  }).catch(()=>{});
}, { once: true });

socket.on("connect", ()=>{
  console.log("✅ Conectado como admin");
});

socket.on("disconnect", ()=>{
  console.log("❌ Socket desconectado");
});
socket.io.on("reconnect", ()=>{
  console.log("🔄 Reconectado");
  loadGuests();
});
// 🔥 CARGAR HUÉSPEDES
async function loadGuests(){

const res = await fetch(`${API}/guests/${company_code}`);

if(!res.ok){
  console.error("Error cargando huéspedes");
  return;
}
 const guests = await res.json();

 const container = document.getElementById("users");
 container.innerHTML = "";

 guests.forEach(g=>{

  const div = document.createElement("div");
  div.className = "user";
  div.id = "guest-"+g.id;

  div.innerText = `${g.name} - Hab ${g.room}`;

  div.onclick = ()=>{
    selectGuest(g);
    div.classList.remove("alert");
  };

  container.appendChild(div);
 });
 if(guests.length > 0){
  selectGuest(guests[0]);
}
}

// 🔥 SELECCIONAR CHAT
async function selectGuest(g){

 currentGuest = g;

 document.querySelectorAll(".user").forEach(u=>u.classList.remove("active"));
 document.getElementById("guest-"+g.id).classList.add("active");

 const res = await fetch(`${API}/chat/${g.id}`);

if(!res.ok){
  console.error("Error cargando chat");
  return;
}

const msgs = await res.json();

 const box = document.getElementById("messages");
 box.innerHTML = "";

 msgs.forEach(m=>{
  addMsg(m.message, m.sender === "staff" ? "me" : "guest");
 });
}
async function loadChat(guestId){

 const res = await fetch(`${API}/chat/${guestId}`);
 const msgs = await res.json();

 const box = document.getElementById("messages");
 box.innerHTML = "";

 msgs.forEach(m=>{
  addMsg(m.message, m.sender === "staff" ? "me" : "guest");
 });

}
// 🔥 MENSAJES
function addMsg(text, type){
 const div = document.createElement("div");
 div.className = "msg " + type;
 div.innerText = text;

 const box = document.getElementById("messages");
 box.appendChild(div);

 box.scrollTop = box.scrollHeight; // 🔥 NUEVO
 const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

div.innerHTML = `
  ${text}
  <div style="font-size:10px; opacity:0.6; text-align:right">${time}</div>
`;
}

// 🔥 ENVIAR
async function send(){

 const input = document.getElementById("msgInput");
 const text = input.value;

 if(!text || !currentGuest) return;

 addMsg(text, "me");

 await fetch(`${API}/chat/message`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
  guest_id: currentGuest.id,
  message: text,
  sender: "staff",
  company_code: company_code
})
 });

 input.value="";
}

// 🔥 ALERTA DE STAFF
socket.on("staff_alert", (data)=>{

 console.log("🔔 ALERTA STAFF:", data);

 const div = document.getElementById("guest-"+data.guest_id);

 if(div){
   div.classList.add("alert");
 }

 audio.currentTime = 0;
audio.play().catch(()=>{});
});

socket.on("new_message", (data)=>{

  console.log("Nuevo mensaje:", data);

  // 🔥 alerta si no es el chat actual
  if(!currentGuest || data.guest_id !== currentGuest.id){
    const div = document.getElementById("guest-"+data.guest_id);
    if(div){
      div.classList.add("alert");
    }
    return;
  }

  // 🔥 SI ES EL CHAT ACTUAL → refrescar completo
  loadChat(data.guest_id);

});

socket.on("task_update", async (tarea)=>{
  console.log("Nueva tarea:", tarea);

  await loadGuests();

  // 🔥 mantener chat abierto si existe
  if(currentGuest){
    selectGuest(currentGuest);
  }
});
  
</script>

</body>
</html>
