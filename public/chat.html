<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">


<style>
body{
 font-family: Arial;
 background:#ece5dd;
 margin:0;
}

.msg{
 margin:5px 0;
 padding:10px;
 border-radius:10px;
 max-width:85%;
font-size:15px;
line-height:1.4;
}

.user{
 background:#dcf8c6;
 align-self:flex-end;
}

.bot{
 background:white;
 align-self:flex-start;
}

.msg strong{
 font-size:11px;
 opacity:0.6;
}

.input-area{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 display:flex;
 padding:10px;
 background:#f0f0f0;
}

.input-area{
 padding-bottom: env(safe-area-inset-bottom);
}

input{
 flex:1;
 padding:10px;
 border-radius:20px;
 border:none;
 outline:none;
}

button{
 margin-left:10px;
 padding:10px 15px;
 border:none;
 border-radius:20px;
 background:#25d366;
 color:white;
}
.chat-container{
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#efeae2;
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-bottom:80px;
}

.chat-input{
  display:flex;
  padding:10px;
  background:white;
  border-top:1px solid #ddd;
  gap:8px;
  position:sticky;
  bottom:0;
}

.chat-input input{
  flex:1;
  border-radius:20px;
  border:1px solid #ccc;
  padding:10px 14px;
}

.chat-input button{
  border-radius:20px;
  padding:10px 16px;
}
.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:16px;
  font-size:14px;
}

.msg.user{
  align-self:flex-end;
  background:#d9fdd3;
}

.msg.bot{
  align-self:flex-start;
  background:white;
}
html, body{
  height:100%;
  overflow:hidden;
}
</style>
</head>

<body>
<script src="/socket.io/socket.io.js"></script>
<div class="chat-container">

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Escribe un mensaje..." />
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>
  
const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa") || "DEMO01";

let guest = null;

try{
 guest = JSON.parse(localStorage.getItem("guest"));
}catch(e){
 console.error("Error parsing guest");
}

if(!guest){
 window.location.replace(`/guest.html?empresa=${company_code}`);
 throw new Error("Redirigiendo...");
}

// 🔥 4. guardar empresa
if(company_code){
  guest.company_code = company_code;
  localStorage.setItem("guest", JSON.stringify(guest));
}

// 🔥 DEBUG
console.log("Guest:", guest);
console.log("Empresa:", guest.company_code);
console.log("Empresa actual:", guest.company_code);

const audio = new Audio("https://actions.google.com/sounds/v1/notifications/notification_simple-01.mp3");

function showToast(msg){

 const toast = document.createElement("div");

 toast.innerText = msg;

 toast.style.position = "fixed";
 toast.style.top = "20px";
 toast.style.right = "20px";
 toast.style.background = "#25d366";
 toast.style.color = "#fff";
 toast.style.padding = "12px 18px";
 toast.style.borderRadius = "10px";
 toast.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
 toast.style.zIndex = "9999";

 document.body.appendChild(toast);

 audio.play(); // 🔥 aquí sí funciona

 setTimeout(()=>toast.remove(),3000);
}

let sessionTimer;
let inactivityTimer;

// 🔥 AHORA SÍ SOCKET
const socket = io({
  transports: ["websocket"]
});
socket.on("typing", ()=>{
  addMsg("Luka está escribiendo...", "bot");
});

socket.emit("join_guest", guest.id);

if(!guest.company_code){
 console.warn("Guest sin empresa");
}

socket.on("new_message", (data)=>{

  if(data.sender === "guest") return;

  if(data.sender === "staff"){
    addMsg("👨‍💼 " + data.message + "\n\n👍 Estoy contigo para ayudarte", "bot");

    showToast("Nuevo mensaje del staff");

    resetInactivity();
    sessionStorage.removeItem("despedida_enviada");
    resetSessionTimer();

    return;
  }

  if(data.sender === "bot"){

    // eliminar "..."
    document.querySelectorAll(".msg.bot").forEach(m=>{
      if(m.innerText.includes("...")) m.remove();
    });

    addMsg(data.message, "bot");
    return;
  }

});

function addMsg(text, type){

 const div = document.createElement("div");
 div.className = "msg " + type;

 // 🔥 Nombre del emisor
 let sender = "";

 if(type === "bot"){
   sender = "Luka 🤖";
 }else{
   sender = "Tú";
 }

 div.innerHTML = `
  <strong>${sender}</strong>
  <div>${text}</div>
`;

 const chat = document.getElementById("chatMessages");
 chat.appendChild(div);

scrollBottom();
}

function resetInactivity(){

 clearTimeout(inactivityTimer);

 inactivityTimer = setTimeout(async () => {

  // 🔥 evitar duplicado
  if(sessionStorage.getItem("despedida_enviada")) return;

  const despedida = "Gracias por contactarnos 🙌\nEsperamos que tu solicitud haya sido atendida.";

  addMsg(despedida, "bot");

  await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    guest_id: guest.id,
    message: despedida,
    sender: "bot",
    company_code: guest.company_code
  })
});

  sessionStorage.setItem("despedida_enviada", "true");

 }, 180000);
}

let sending = false;

async function send(){

 if(sending) return;
 sending = true;

 const input = document.getElementById("input");
 const text = input.value.trim();

 sessionStorage.removeItem("despedida_enviada");

 if(!guest || !guest.id){
  console.error("Guest inválido");
  return;
}

 if(!text){
  sending = false;
  return;
}

 if(text.toLowerCase() === "menu"){
  addMsg(text,"user");

  await fetch("/chat/message",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      guest_id: guest.id,
      message: text,
      sender: "guest",
      company_code: guest.company_code
    })
  });
  

  sending = false; 
  return;
}

 addMsg(text,"user");


 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
   guest_id: guest.id,
   message: text,
   sender: "guest",
   company_code: guest.company_code
  })
});

 input.value="";
 input.focus();

 resetInactivity();
 resetSessionTimer();
 sending = false;

}
function closeSession(){

  const mensaje = "🔒 Por seguridad, tu sesión ha finalizado.\n\nPor favor escanea nuevamente el código QR para nuevas solicitudes.";

  addMsg(mensaje, "bot");

  // limpiar sesión
  localStorage.removeItem("guest");

  // bloquear input
  document.getElementById("input").disabled = true;
 
  setTimeout(()=>{
  window.location.href = `/guest.html?empresa=${company_code}`;
}, 4000);

}
function resetSessionTimer(){

  clearTimeout(sessionTimer);

  sessionTimer = setTimeout(()=>{
    closeSession();
  }, 900000); // 15 min
}
function scrollBottom(){
  const chat = document.getElementById("chatMessages");
  if(!chat) return;

  chat.scrollTo({
    top: chat.scrollHeight,
    behavior: "smooth"
  });
}
// 🔥 mensaje de bienvenida PRO

const hora = new Date().getHours();

let saludo = "Hola";

if(hora < 12) saludo = "Buenos días";
else if(hora < 19) saludo = "Buenas tardes";
else saludo = "Buenas noches";

(async () => {

 const mensaje = `${saludo} ${guest.name} 👋  
Soy Luka 🤖, tu asistente virtual del hotel.  

¿En qué puedo ayudarte hoy?`;

 addMsg(mensaje, "bot");

 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    guest_id: guest.id,
    message: mensaje,
    sender: "bot",
    company_code: guest.company_code
  })
});

})();
window.addEventListener("load", ()=>{

  const input = document.getElementById("input");

  if(input){

    input.addEventListener("keypress", function(e){
      if(e.key === "Enter"){
        send();
      }
    });

    input.addEventListener("focus", ()=>{
      setTimeout(scrollBottom, 300);
    });

  }

});

resetInactivity();
resetSessionTimer();
</script>

</body>
</html>
