<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">


<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial;
}

.chat-container {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #e5ddd5;
}

.chat-header {
  padding: 15px;
  background: #0f172a;
  color: white;
  font-weight: bold;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 120px;
}

.msg {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
}

.msg.bot {
  background: white;
  align-self: flex-start;
}

.msg.user {
  background: #bbf7d0;
  align-self: flex-end;
}

.chat-input {
  position: sticky;
  bottom: 0;
  z-index: 10;
  display: flex;
  gap: 10px;
  padding: 10px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: white;
  border-top: 1px solid #ddd;
}

.chat-input input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ddd;
}

.chat-input button {
  background: #22c55e;
  border: none;
  padding: 0 16px;
  border-radius: 20px;
  color: white;
}
</style>
</head>

<body>
<script src="/socket.io/socket.io.js"></script>
<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    <span>Luka Chat Bot🤖</span>
  </div>

  <!-- MENSAJES -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- INPUT -->
  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Escribe un mensaje...">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>
  
const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa") || "DEMO01";

let guest = null;

try{
 guest = JSON.parse(localStorage.getItem("guest"));
}catch(e){
 console.error("Error parsing guest");
}

if(!guest){
 window.location.replace(`/guest.html?empresa=${company_code}`);
 throw new Error("Redirigiendo...");
}

// 🔥 4. guardar empresa
if(company_code){
  guest.company_code = company_code;
  localStorage.setItem("guest", JSON.stringify(guest));
}

// 🔥 DEBUG
console.log("Guest:", guest);
console.log("Empresa:", guest.company_code);
console.log("Empresa actual:", guest.company_code);

const audio = new Audio("https://actions.google.com/sounds/v1/notifications/notification_simple-01.mp3");

function showToast(msg){

 const toast = document.createElement("div");

 toast.innerText = msg;

 toast.style.position = "fixed";
 toast.style.top = "20px";
 toast.style.right = "20px";
 toast.style.background = "#25d366";
 toast.style.color = "#fff";
 toast.style.padding = "12px 18px";
 toast.style.borderRadius = "10px";
 toast.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
 toast.style.zIndex = "9999";

 document.body.appendChild(toast);

 audio.play(); // 🔥 aquí sí funciona

 setTimeout(()=>toast.remove(),3000);
}

let sessionTimer;
let inactivityTimer;

// 🔥 AHORA SÍ SOCKET
const API = "https://mollyhelpers.com";

const socket = io(API,{
  transports:["websocket","polling"],
  reconnection:true,
  reconnectionAttempts:5,
  reconnectionDelay:1000,
  timeout:20000
});
const input = document.getElementById("msgInput");

let typingTimeout;

input.addEventListener("input", ()=>{

  socket.emit("typing",{
    guest_id: guest.id,
    company_code: guest.company_code
  });

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(()=>{}, 1000);

});

socket.on("connect", ()=>{ 
  console.log("🟢 Socket conectado");

  const guest_id = guest?.id;

if(!guest_id){
  console.error("❌ guest_id inválido");
  return;
}
console.log("JOIN ROOM:", guest_id);
socket.emit("join_guest", guest_id); // 🔥 CRÍTICO
});

socket.on("disconnect", ()=>{
  console.log("🔴 Socket desconectado");
});

socket.on("new_message", (data)=>{

  if(!data) return;

  const { message, sender } = data;

  if(!message) return;

  // 🔥 evitar duplicar mensajes propios
  if(sender === "guest") return;

   socket.emit("message_read",{
  guest_id: guest.id,
  company_code: guest.company_code
});

  if(sender === "admin" || sender === "staff"){
    addMsg("👨‍💼 " + message, "bot");
    showToast("Nuevo mensaje del staff");
    return;
  }

  if(sender === "bot"){
    addMsg(message, "bot");
    return;
  }
 

});
socket.on("typing_admin", ()=>{

  const existing = document.getElementById("typing");

  if(existing) return;

  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg bot";
  div.innerText = "🧑‍💼 escribiendo...";

  document.getElementById("chatMessages").appendChild(div);

  setTimeout(()=>{
    div.remove();
  }, 1500);

});
function addMessage(text, type) {
  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  container.appendChild(div);

  // 🔥 auto scroll SIEMPRE al final
  container.scrollTop = container.scrollHeight;
}
function addMsg(text, type){

 const div = document.createElement("div");
 div.className = "msg " + type;

 // 🔥 Nombre del emisor
 let sender = "";

 if(type === "bot"){
   sender = "Luka 🤖";
 }else{
   sender = "Tú";
 }

 div.innerHTML = `
  <strong>${sender}</strong>
  <div>${text}</div>
`;

 const chat = document.getElementById("chatMessages");
 chat.appendChild(div);

scrollBottom();
}

function resetInactivity(){

 clearTimeout(inactivityTimer);

 inactivityTimer = setTimeout(async () => {

  if(sessionStorage.getItem("despedida_enviada")) return;

  const despedida = "Gracias por contactarnos 🙌...";

const res = await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    guest_id: guest.id,
    message: despedida,
    sender: "bot",
    company_code: guest.company_code
  })
});

const data = await res.json();

if(!res.ok){
  console.error("❌ ERROR BACKEND:", data);
}

  sessionStorage.setItem("despedida_enviada", "true");

 }, 180000);
}

let sending = false;

async function send(){

 if(sending) return;
 sending = true;

 const input = document.getElementById("msgInput");
 const text = input.value.trim();

 sessionStorage.removeItem("despedida_enviada");

 if(!guest || !guest.id){
  console.error("Guest inválido");
  sending = false;
  return;
}

 if(!text){
  sending = false;
  return;
}

 if(text.toLowerCase() === "menu"){
  addMsg(text,"user");

 const res = await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    guest_id: guest.id,
    message: text,
    sender: "guest",
    company_code: guest.company_code
  })
});

const data = await res.json();

if(!res.ok){
  console.error("❌ ERROR BACKEND:", data);
}

  sending = false; 
  return;
}

 addMsg(text,"user");


 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
   guest_id: guest.id,
   message: text,
   sender: "guest",
   company_code: guest.company_code
  })
});

 input.value="";
 input.focus();

 resetInactivity();
 resetSessionTimer();
 sending = false;

}
function closeSession(){

  const mensaje = "🔒 Por seguridad, tu sesión ha finalizado.\n\nPor favor escanea nuevamente el código QR para nuevas solicitudes.";

  addMsg(mensaje, "bot");

  // limpiar sesión
  localStorage.removeItem("guest");

  // bloquear input
  document.getElementById("msgInput").disabled = true;
 
  setTimeout(()=>{
  window.location.href = `/guest.html?empresa=${company_code}`;
}, 4000);

}
function resetSessionTimer(){

  clearTimeout(sessionTimer);

  sessionTimer = setTimeout(()=>{
    closeSession();
  }, 900000); // 15 min
}
function scrollBottom(){
  const chat = document.getElementById("chatMessages");
  if(!chat) return;

  chat.scrollTo({
    top: chat.scrollHeight,
    behavior: "smooth"
  });
}
// 🔥 mensaje de bienvenida PRO

const hora = new Date().getHours();

let saludo = "Hola";

if(hora < 12) saludo = "Buenos días";
else if(hora < 19) saludo = "Buenas tardes";
else saludo = "Buenas noches";

(async () => {

 const mensaje = `${saludo} ${guest.name} 👋  
Soy Luka 🤖, tu asistente virtual del hotel.  

¿En qué puedo ayudarte hoy?`;

 addMsg(mensaje, "bot");

 const res = await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    guest_id: guest.id,
    message: mensaje,
    sender: "bot",
    company_code: guest.company_code
  })
 });

 const data = await res.json();

 if(!res.ok){
  console.error("❌ ERROR BACKEND:", data);
 }

})();

window.addEventListener("load", ()=>{

  const input = document.getElementById("msgInput");

  if(input){

    input.addEventListener("keypress", function(e){
      if(e.key === "Enter"){
        send();
      }
    });

    input.addEventListener("focus", ()=>{
      setTimeout(scrollBottom, 300);
    });

  }

});

resetInactivity();
resetSessionTimer();
</script>

</body>
</html>
