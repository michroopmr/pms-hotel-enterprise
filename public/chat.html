<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body{
 font-family: Arial;
 background:#ece5dd;
 margin:0;
}

.chat{
 padding:10px;
 height:80vh;
 overflow-y:auto;
 display:flex;
 flex-direction:column;
}

.msg{
 margin:5px 0;
 padding:10px;
 border-radius:10px;
 max-width:70%;
 position:relative;
}

.user{
 background:#dcf8c6;
 align-self:flex-end;
}

.bot{
 background:white;
 align-self:flex-start;
}

.msg strong{
 font-size:11px;
 opacity:0.6;
}

.input-area{
 display:flex;
 padding:10px;
 background:#f0f0f0;
}

input{
 flex:1;
 padding:10px;
 border-radius:20px;
 border:none;
 outline:none;
}

button{
 margin-left:10px;
 padding:10px 15px;
 border:none;
 border-radius:20px;
 background:#25d366;
 color:white;
}
</style>
</head>

<body>
<script src="/socket.io/socket.io.js"></script>
<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Escribe un mensaje...">
  <button onclick="send()">➤</button>
</div>

<script>
const guest = JSON.parse(localStorage.getItem("guest"));

if(!guest){
 alert("Sesión expirada");
 window.location.href = "/guest.html";
}

// 🔥 AHORA SÍ SOCKET
const socket = io();
socket.emit("join_guest", guest.id);

socket.on("new_message", (data)=>{

 if(data.sender === "guest") return;

 if(data.sender === "staff"){
   addMsg("👨‍💼 " + data.message, "bot");
   return;
 }

});

function addMsg(text, type){

 const div = document.createElement("div");
 div.className = "msg " + type;

 // 🔥 Nombre del emisor
 let sender = "";

 if(type === "bot"){
   sender = "Luka 🤖";
 }else{
   sender = "Tú";
 }

 div.innerHTML = `
  <strong>${sender}</strong>
  <div>${text}</div>
`;

 const chat = document.getElementById("chat");
 chat.appendChild(div);

 chat.scrollTop = chat.scrollHeight;
}

async function send(){

 const input = document.getElementById("input");
 const text = input.value.trim();

 if(!text) return;

 addMsg(text,"user");

 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
   guest_id: guest.id,
   message: text,
   sender: "guest"
  })
 });

 input.value="";
 input.focus();

 botReply(text);
}
function detectarDepartamento(msg){

 msg = msg.toLowerCase();

 if(msg.includes("aire") || msg.includes("clima") || msg.includes("tv") || msg.includes("luz")){
   return "Mantenimiento";
 }

 if(msg.includes("toalla") || msg.includes("limpieza") || msg.includes("sábanas")){
   return "Housekeeping";
 }

 if(msg.includes("comida") || msg.includes("room service") || msg.includes("hambre")){
   return "Alimentos Bebidas";
 }

 return "Recepción";
}

async function botReply(msg){

 let reply = "¿En qué puedo ayudarte?";

 // 🔥 mostrar "escribiendo..."
 const typing = document.createElement("div");
 typing.className = "msg bot";
 typing.innerHTML = "<strong>Luka 🤖:</strong><br>Luka está escribiendo...";

 const chat = document.getElementById("chat");
 chat.appendChild(typing);
 chat.scrollTop = chat.scrollHeight;

 await new Promise(r => setTimeout(r, 800));

 try{

  if(msg.toLowerCase().includes("horario")){
    reply = "Restaurante: 7am - 10pm";
  }

  else if(
   msg.toLowerCase().includes("no funciona") ||
   msg.toLowerCase().includes("problema") ||
   msg.toLowerCase().includes("falla")
  ){

    const dept = detectarDepartamento(msg);

    const res = await fetch("/tasks",{
     method:"POST",
     headers:{
      "Content-Type":"application/json"
     },
     body: JSON.stringify({
      title: "Reporte habitación " + guest.room,
      description: msg,
      department: dept,
      user: guest.name
     })
    });

    if(!res.ok){
      throw new Error("No se pudo crear el ticket");
    }

    reply = "Ya reporté tu solicitud 🛠️\nEn breve el equipo acudirá a tu habitación.";
  }

 }catch(err){

  console.error(err);

  reply = "No pude generar el reporte 😔\nIntenta nuevamente o contacta recepción.";
 }

 // 🔥 reemplazar mensaje typing
 typing.innerHTML = `<strong>Luka 🤖:</strong><br>${reply}`;

 // 🔥 guardar respuesta
 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
   guest_id: guest.id,
   message: reply,
   sender: "bot"
  })
 });

}
</script>

</body>
</html>
