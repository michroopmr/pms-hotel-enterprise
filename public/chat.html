<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body{
 font-family: Arial;
 background:#ece5dd;
 margin:0;
}

.chat{
 padding:10px;
 height:80vh;
 overflow-y:auto;
 display:flex;
 flex-direction:column;
}

.msg{
 margin:5px 0;
 padding:10px;
 border-radius:10px;
 max-width:70%;
 position:relative;
}

.user{
 background:#dcf8c6;
 align-self:flex-end;
}

.bot{
 background:white;
 align-self:flex-start;
}

.msg strong{
 font-size:11px;
 opacity:0.6;
}

.input-area{
 display:flex;
 padding:10px;
 background:#f0f0f0;
}

input{
 flex:1;
 padding:10px;
 border-radius:20px;
 border:none;
 outline:none;
}

button{
 margin-left:10px;
 padding:10px 15px;
 border:none;
 border-radius:20px;
 background:#25d366;
 color:white;
}
</style>
</head>

<body>
<script src="/socket.io/socket.io.js"></script>
<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Escribe un mensaje...">
  <button onclick="send()">➤</button>
</div>

<script>

if(company_code && guest){
  guest.company_code = company_code;
  localStorage.setItem("guest", JSON.stringify(guest));
}

const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa");

if(company_code){
  guest.company_code = company_code;
  localStorage.setItem("guest", JSON.stringify(guest));
}

if(!guest){
 alert("Sesión expirada");
 window.location.href = "/guest.html";
}
const audio = new Audio("https://actions.google.com/sounds/v1/notifications/notification_simple-01.mp3");

function showToast(msg){

 const toast = document.createElement("div");

 toast.innerText = msg;

 toast.style.position = "fixed";
 toast.style.top = "20px";
 toast.style.right = "20px";
 toast.style.background = "#25d366";
 toast.style.color = "#fff";
 toast.style.padding = "12px 18px";
 toast.style.borderRadius = "10px";
 toast.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
 toast.style.zIndex = "9999";

 document.body.appendChild(toast);

 audio.play(); // 🔥 aquí sí funciona

 setTimeout(()=>toast.remove(),3000);
}
// 🔥 AHORA SÍ SOCKET
const socket = io("https://mollyhelpers.com",{
  transports: ["websocket"]
});

socket.emit("join_guest", guest.id);

socket.on("new_message", (data)=>{

 if(data.sender === "guest") return;

 if(data.sender === "staff"){
   addMsg("👨‍💼 " + data.message, "bot");

   // 🔥 NUEVO
   showToast("Nuevo mensaje del staff");

   return;
 }

 if(data.sender === "bot"){
   return;
 }

});

function addMsg(text, type){

 const div = document.createElement("div");
 div.className = "msg " + type;

 // 🔥 Nombre del emisor
 let sender = "";

 if(type === "bot"){
   sender = "Luka 🤖";
 }else{
   sender = "Tú";
 }

 div.innerHTML = `
  <strong>${sender}</strong>
  <div>${text}</div>
`;

 const chat = document.getElementById("chat");
 chat.appendChild(div);

 chat.scrollTop = chat.scrollHeight;
}

async function send(){

 const input = document.getElementById("input");
 const text = input.value.trim();

 if(!text) return;

 if(text.toLowerCase() === "menu"){
  addMsg(text,"user"); // 🔥 agrega esto
  await botReply("menu");
  return;
}

 addMsg(text,"user");

 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
   guest_id: guest.id,
   message: text,
   sender: "guest"
  })
 });

 input.value="";
 input.focus();

 await botReply(text);
}
function detectarDepartamento(msg){

 msg = msg.toLowerCase();

 if(msg.includes("aire") || msg.includes("clima") || msg.includes("tv") || msg.includes("luz")){
   return "Mantenimiento";
 }

 if(msg.includes("toalla") || msg.includes("limpieza") || msg.includes("sábanas")){
   return "Housekeeping";
 }

 if(msg.includes("comida") || msg.includes("room service") || msg.includes("hambre")){
   return "Alimentos Bebidas";
 }

 return "Recepción";
}

async function botReply(msg){

 let reply = "¿En qué puedo ayudarte?";

 const typing = document.createElement("div");
 typing.className = "msg bot";
 typing.innerHTML = "<strong>Luka 🤖:</strong><br>Luka está escribiendo...";

 const chat = document.getElementById("chat");
 chat.appendChild(typing);
 chat.scrollTop = chat.scrollHeight;

 await new Promise(r => setTimeout(r, 800));

 try{

  const texto = msg.toLowerCase();

  const esFalla = [
 "no funciona",
 "problema",
 "falla",
 "no sirve",
 "no jala",
 "no prende",
 "descompuesto",
 "no enfría",
 "no calienta",
 "no hay",
 "no tengo",
 "no sirve el",
 "no hay agua",
 "sin servicio"
].some(p => texto.includes(p));

  console.log("Mensaje:", msg);
  console.log("Es falla:", esFalla);

  if(texto.includes("horario")){
    reply = "Restaurante: 7am - 10pm";
  }

  else if(esFalla){

    const dept = detectarDepartamento(msg);

    const res = await fetch("/guest/task",{
     method:"POST",
     headers:{
      "Content-Type":"application/json"
     },
     body: JSON.stringify({
  title: "Reporte habitación " + guest.room,
  description: msg,
  department: dept,
  guest_name: guest.name,
  room: guest.room,
  company_code: guest.company_code // 🔥 NUEVO
})
    });

    if(!res.ok){
      const errorText = await res.text();
      console.error("Error backend:", errorText);
      throw new Error("No se pudo crear el ticket");
    }

    const data = await res.json();
    console.log("Ticket creado:", data);

    reply = `✅ Ticket generado (#${data.id})  
Departamento: ${dept}  

🛠️ En breve el equipo acudirá a tu habitación.`;
  }

  else{
    reply = `Puedo ayudarte con:

🛠️ Reportar fallas
🧹 Limpieza / toallas

Solo dime qué necesitas 😊`;
  }

}catch(err){

  console.error(err);

  reply = "No pude generar el reporte 😔\nIntenta nuevamente o contacta recepción.";
}

 typing.innerHTML = `<strong>Luka 🤖:</strong><br>${reply}`;

 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
   guest_id: guest.id,
   message: reply,
   sender: "bot"
  })
 });

}

// 🔥 mensaje de bienvenida PRO

const hora = new Date().getHours();

let saludo = "Hola";

if(hora < 12) saludo = "Buenos días";
else if(hora < 19) saludo = "Buenas tardes";
else saludo = "Buenas noches";

(async () => {

if(!sessionStorage.getItem("welcome_shown")){

 const mensaje = `${saludo} ${guest.name} 👋  
Soy Luka 🤖, tu asistente virtual del hotel.  

¿En qué puedo ayudarte hoy?`;

 addMsg(mensaje, "bot");

 await fetch("/chat/message",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    guest_id: guest.id,
    message: mensaje,
    sender: "bot"
  })
 });

 sessionStorage.setItem("welcome_shown", "true");
}
})();

</script>

</body>
</html>
