<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<style>
/* RESET */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  overflow: hidden; /* 🔥 evita bugs mobile */
  font-family: Arial, sans-serif;
}

/* CONTENEDOR GENERAL */
.chat-container {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #e5ddd5;
}

/* HEADER */
.chat-header {
  padding: 15px;
  background: #0f172a;
  color: white;
  font-weight: bold;
}

/* MENSAJES */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 120px; /* 🔥 evita overlap */
}

/* BURBUJAS */
.msg {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
}

/* BOT */
.msg.bot {
  background: white;
  align-self: flex-start;
}

/* USER */
.msg.user {
  background: #bbf7d0;
  align-self: flex-end;
}

/* INPUT AREA */
.chat-input {
  position: sticky;
  bottom: 0;
  z-index: 10;
  display: flex;
  gap: 10px;
  padding: 10px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* 🔥 iPhone */
  background: white;
  border-top: 1px solid #ddd;
}

/* INPUT */
.chat-input input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ddd;
}

/* BUTTON */
.chat-input button {
  background: #22c55e;
  border: none;
  padding: 0 16px;
  border-radius: 20px;
  color: white;
}
.msg span {
  opacity: 0.7;
}
</style>
</head>

<body>

<script src="/socket.io/socket.io.js"></script>

<div class="chat-container">

  <div class="chat-header">
    Luka 🤖
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Escribe un mensaje...">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>

// ================= CONFIG =================
const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa") || "DEMO01";

let guest = null;

try{
  guest = JSON.parse(localStorage.getItem("guest"));
}catch(e){
  console.error("Error parsing guest");
}

if(!guest){
  window.location.replace(`/guest.html?empresa=${company_code}`);
  throw new Error("Redirigiendo...");
}

// guardar empresa
guest.company_code = company_code;
localStorage.setItem("guest", JSON.stringify(guest));

// ================= SOCKET =================
const API = "https://mollyhelpers.com";

const socket = io(API,{
  transports:["websocket","polling"]
});

// ================= INPUT =================
const input = document.getElementById("msgInput");

input.addEventListener("input", ()=>{
  socket.emit("typing",{
    guest_id: guest.id,
    company_code: guest.company_code
  });
});

// ================= CONNECT =================
socket.on("connect", ()=>{
  socket.emit("join_guest", guest.id);
});

// ================= MENSAJES =================
socket.on("new_message", (data)=>{

  if(!data || data.sender === "guest") return;

  socket.emit("message_read",{
    guest_id: guest.id,
    company_code: guest.company_code
  });

  if(data.sender === "admin" || data.sender === "staff"){
    addMsg("👨‍💼 " + data.message, "bot");
  }

  if(data.sender === "bot"){
    addMsg(data.message, "bot");
  }

});

// ================= TYPING =================
socket.on("typing_admin", ()=>{

  if(document.getElementById("typing")) return;

  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg bot";
  div.innerText = "🧑‍💼 escribiendo...";

  chatMessages.appendChild(div);

  setTimeout(()=> div.remove(), 1500);

});
function getHora(){
  const now = new Date();
  return now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });
}
// ================= UI =================
function addMsg(text, type){

  const div = document.createElement("div");
  div.className = "msg " + type;

  const sender = type === "bot" ? "Luka 🤖" : "Tú";
  const hora = getHora();

  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:end; gap:10px;">
      
      <div>
        <strong>${sender}</strong>
        <div>${text}</div>
      </div>

      <span style="
        font-size:11px;
        color:#6b7280;
        white-space:nowrap;
      ">
        ${hora}
      </span>

    </div>
  `;

  chatMessages.appendChild(div);
  scrollBottom();
}

function scrollBottom(){
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ================= SEND =================
let sending = false;

async function send(){

  if(sending) return;
  sending = true;

  const text = input.value.trim();

  if(!text){
    sending = false;
    return;
  }

  addMsg(text,"user");

  await fetch("/chat/message",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      guest_id: guest.id,
      message: text,
      sender: "guest",
      company_code: guest.company_code
    })
  });

  input.value="";
  input.focus();

  sending = false;
}

// ENTER
input.addEventListener("keypress",(e)=>{
  if(e.key === "Enter"){
    send();
  }
});

// ================= BIENVENIDA =================
(function(){

  const hora = new Date().getHours();
  let saludo = "Hola";

  if(hora < 12) saludo = "Buenos días";
  else if(hora < 19) saludo = "Buenas tardes";
  else saludo = "Buenas noches";

  const mensaje = `${saludo} ${guest.name} 👋  
Soy Luka 🤖 ¿En qué puedo ayudarte?`;

  addMsg(mensaje, "bot");

})();

</script>

</body>
</html>
