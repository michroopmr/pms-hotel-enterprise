<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente del Hotel</title>

<style>
body{
  font-family: Arial;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100dvh; /* 🔥 fix móvil */
  margin:0;
}

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  width:90%;
  max-width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* 🔥 inputs */
.card input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* 🔥 botón */
.card button{
  width:100%;
  padding:14px;
  margin-top:16px;
  border:none;
  background:#111827;
  color:white;
  border-radius:10px;
  font-size:16px;
}
.card h2{
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="card">
<h2>Bienvenido 👋</h2>
<p>Ingresa tus datos para continuar</p>

<input type="text" id="name" placeholder="Nombre">
<input type="text" id="room" placeholder="Número de habitación">

<button onclick="login()">Entrar</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa") || "DEMO01";

async function login(){
 const name = document.getElementById("name").value;
 const room = document.getElementById("room").value;

 if(!name || !room){
   alert("Completa todos los campos");
   return;
 }

 const res = await fetch("/guest/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    name,
    room,
    company_code // 🔥 importante
  })
 });

 const data = await res.json();

 if(!res.ok){
  alert(data.error || "Error al registrar huésped");
  return;
 }

 localStorage.setItem("guest", JSON.stringify({
  id: data.id,
  name: name,
  room: room,
  company_code: company_code
 }));

 window.location.href = `/chat.html?empresa=${company_code}`;
}
</script>

</body>
</html>
