<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente del Hotel</title>

<style>
/* RESET PRO */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
}

/* CONTAINER */
.login-container {
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CARD */
.login-card {
  width: 100%;
  max-width: 380px;
  background: white;
  padding: 25px 20px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* TEXT */
.login-card h2 {
  margin-bottom: 5px;
}

.login-card p {
  color: #6b7280;
  margin-bottom: 15px;
}

/* INPUTS */
.login-card input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-size: 16px;
}

/* BUTTON */
.login-card button {
  width: 100%;
  margin-top: 18px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<div class="login-container">
  <div class="login-card">
    
    <h2>Bienvenido 👋</h2>
    <p>Ingresa tus datos para continuar</p>

    <input type="text" placeholder="Nombre" id="guest_name">
    <input type="text" placeholder="Habitación" id="guest_room">

    <button onclick="entrarChat()">Entrar</button>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
const company_code = params.get("empresa") || "DEMO01";

async function login(){
 const name = document.getElementById("name").value;
 const room = document.getElementById("room").value;

 if(!name || !room){
   alert("Completa todos los campos");
   return;
 }

 const res = await fetch("/guest/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    name,
    room,
    company_code // 🔥 importante
  })
 });

 const data = await res.json();

 if(!res.ok){
  alert(data.error || "Error al registrar huésped");
  return;
 }

 localStorage.setItem("guest", JSON.stringify({
  id: data.id,
  name: name,
  room: room,
  company_code: company_code
 }));

 window.location.href = `/chat.html?empresa=${company_code}`;
}
</script>

</body>
</html>
